name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    env:
      PYTHON_VERSION: '3.11'
      NODE_VERSION: '18'
      
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 缓存Python依赖
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: 安装Python依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: 构建C++扩展模块
      run: |
        cd ww-toolbox
        python setup.py build_ext --inplace
        
    - name: 设置Node.js环境
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        
    - name: 安装前端依赖
      run: |
        cd ww-toolbox/frontend
        npm install
        npm install electron electron-builder --save-dev
        
    - name: 使用PyInstaller打包Python后端
      run: |
        cd ww-toolbox
        pyinstaller --onefile --windowed --icon=assets/icon.ico main.py
        
    - name: 配置Electron Builder
      run: |
        cd ww-toolbox/frontend
        echo '{
          "name": "ww-toolbox",
          "version": "1.0.0",
          "main": "main.js",
          "description": "WW Toolbox Application",
          "scripts": {
            "start": "electron .",
            "build": "electron-builder",
            "pack": "electron-builder --dir",
            "dist": "electron-builder"
          },
          "build": {
            "appId": "com.example.ww-toolbox",
            "productName": "WW Toolbox",
            "directories": {
              "output": "dist"
            },
            "files": [
              "**/*",
              "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}",
              "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}",
              "!**/node_modules/*.d.ts",
              "!**/node_modules/.bin",
              "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}",
              "!.editorconfig",
              "!**/._*",
              "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}",
              "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}",
              "!**/{appveyor.yml,.travis.yml,circle.yml}",
              "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"
            ],
            "win": {
              "target": "nsis",
              "icon": "../assets/icon.ico"
            },
            "nsis": {
              "oneClick": false,
              "allowToChangeInstallationDirectory": true
            }
          },
          "devDependencies": {
            "electron": "^25.0.0",
            "electron-builder": "^24.0.0"
          }
        }' > package.json
        
    - name: 使用Electron Builder打包应用
      run: |
        cd ww-toolbox/frontend
        npm run dist
        
    - name: 上传构建产物
      uses: actions/upload-artifact@v3
      with:
        name: ww-toolbox-windows-build
        path: |
          ww-toolbox/dist/main.exe
          ww-toolbox/frontend/dist/
        retention-days: 30
