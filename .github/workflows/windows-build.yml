name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    permissions:
      contents: read

    env:
      PYTHON_VERSION: '3.11'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            **/.venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine

      - name: Install dependencies
        if: exists('requirements.txt')
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint (optional)
        if: fileExists('setup.py') || fileExists('main.py')
        run: |
          python -m pip install --upgrade flake8
          flake8 --version || echo "flake8 not configured"
          # Run flake8 only if there is a config or python files
          flake8 || true

      - name: Build sdist and wheel
        run: |
          python -m build --sdist --wheel --outdir dist

      - name: Validate wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl || true
          python -m pip check || true

      - name: Run basic smoke tests (if any)
        run: |
          if (Test-Path -Path tests) {
            python -m pip install pytest
            pytest -q
          } else {
            Write-Host "No tests/ directory found - skipping pytest"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist
