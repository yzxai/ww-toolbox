name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.9', '3.10', '3.11']
        node-version: ['18.x', '20.x']

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: 安装Python依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装构建C++扩展所需的额外依赖
        pip install pybind11

    - name: 构建C++扩展
      run: |
        python setup.py build_ext --inplace

    - name: 设置Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: 安装前端依赖
      working-directory: ./frontend
      run: npm install

    - name: 构建前端应用
      working-directory: ./frontend
      run: npm run build
      env:
        # 设置环境变量以避免在CI环境中出现交互式提示
        CI: true

    - name: 运行Python测试
      run: |
        python -m pytest tests/ -v || echo "没有找到测试或测试失败"
      continue-on-error: true

    - name: 运行前端测试
      working-directory: ./frontend
      run: npm test || echo "没有找到测试或测试失败"
      continue-on-error: true

    - name: 归档构建产物 (Python)
      uses: actions/upload-artifact@v4
      with:
        name: python-build-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          toolbox/
          *.so
          *.pyd
          !toolbox/__pycache__/
          !**/*.pyc
        retention-days: 30

    - name: 归档构建产物 (前端)
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build-${{ matrix.os }}-node${{ matrix.node-version }}
        path: |
          frontend/dist/
          frontend/out/
          frontend/build/
        retention-days: 30

  # 部署作业（仅在主分支推送时运行）
  deploy:
    needs: build
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: 下载所有构建产物
      uses: actions/download-artifact@v4

    - name: 创建发布包
      run: |
        mkdir release
        # 合并不同平台的构建产物
        xcopy /E /I /Y python-build-*\* release\ || echo "Python构建产物复制完成"
        xcopy /E /I /Y frontend-build-*\* release\ || echo "前端构建产物复制完成"
        
        # 创建压缩包
        tar -czf ww-toolbox-${{ github.sha }}.tar.gz release/

    - name: 上传发布包
      uses: actions/upload-artifact@v4
      with:
        name: ww-toolbox-release-${{ github.sha }}
        path: ww-toolbox-${{ github.sha }}.tar.gz
        retention-days: 90
